<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネミル — 底値・買い時データベース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
:root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface-muted: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --primary: #059669;
    --primary-dark: #047857;
    --primary-light: #d1fae5;
    --accent: #0ea5e9;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 4px 6px rgba(15, 23, 42, 0.04), 0 20px 40px rgba(15, 23, 42, 0.08);
}

* {
    box-sizing: border-box;
}

body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

.site-header {
    background: linear-gradient(135deg, #047857 0%, #059669 50%, #0d9488 100%);
    color: white;
    padding: 28px 20px 48px;
    position: relative;
    overflow: hidden;
}

.site-header::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -10%;
    width: 280px;
    height: 280px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 50%;
}

.site-header::after {
    content: "";
    position: absolute;
    bottom: -60%;
    left: -5%;
    width: 200px;
    height: 200px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50%;
}

.header-inner {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 8px;
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
}

.logo-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 1.4rem;
    backdrop-filter: blur(8px);
}

.tagline {
    margin: 0;
    font-size: 0.95rem;
    opacity: 0.9;
    font-weight: 400;
}

.container {
    max-width: 720px;
    margin: -28px auto 0;
    padding: 0 16px 48px;
    position: relative;
    z-index: 2;
}

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.card-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
}

.card-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--primary-light);
    border-radius: 10px;
    font-size: 1rem;
    flex-shrink: 0;
}

.section-heading {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 28px 0 12px 4px;
}

.search-card {
    padding: 20px;
}

.search-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
}

.search-row {
    display: flex;
    gap: 10px;
}

.input-wrap {
    position: relative;
    flex: 1;
}

input[type="text"],
input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    font-family: inherit;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
}

input::placeholder {
    color: #94a3b8;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 24px;
    border: 0;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
    white-space: nowrap;
}

.btn:active {
    transform: scale(0.98);
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
}

.btn-primary:hover {
    box-shadow: 0 6px 16px rgba(5, 150, 105, 0.4);
}

.btn-block {
    width: 100%;
    margin-top: 16px;
}

.btn-icon {
    flex: 0 0 auto;
    width: 48px;
    padding: 0;
    background: var(--surface-muted);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    font-size: 1.2rem;
}

.btn-icon:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.field-group {
    margin-bottom: 16px;
}

.field-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
}

.product-row {
    display: flex;
    gap: 10px;
}

.product-row input {
    flex: 1;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 20px 0;
}

.stat-card {
    background: var(--surface-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
}

.stat-label {
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 500;
    margin-bottom: 4px;
}

.stat-value {
    color: var(--text);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
}

.current-price {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 18px;
    background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
    border: 1px solid #bbf7d0;
    border-radius: var(--radius-sm);
    margin-bottom: 4px;
}

.price-large {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: -0.03em;
}

.score-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
}

.score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.9rem;
    font-weight: 600;
}

.score-value {
    font-size: 1.1rem;
    color: var(--primary-dark);
}

.score-bar {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 12px;
}

.score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #34d399 100%);
    border-radius: 99px;
    transition: width 0.4s ease;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 99px;
    font-size: 0.875rem;
    font-weight: 600;
}

.badge-good {
    background: #d1fae5;
    color: #065f46;
}

.badge-warn {
    background: #fef3c7;
    color: #92400e;
}

.badge-bad {
    background: #fee2e2;
    color: #991b1b;
}

.rank {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
}

.rank:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.rank:first-child {
    padding-top: 0;
}

.rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 32px;
    font-size: 1rem;
    font-weight: 700;
}

.rank-main {
    flex: 1;
    min-width: 0;
}

.rank-product {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
}

.rank-store {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
}

.rank-price {
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary-dark);
    white-space: nowrap;
}

.rank-top .rank-price {
    font-size: 1.1rem;
}

.empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
}

.empty-state-icon {
    font-size: 2rem;
    margin-bottom: 8px;
    opacity: 0.6;
}

.empty-state p {
    margin: 0;
    font-size: 0.9rem;
}

.suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    max-height: 220px;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    z-index: 100;
}

.suggestion-item {
    padding: 12px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
}

.suggestion-item:last-child {
    border-bottom: none;
}

.suggestion-item:hover {
    background: var(--primary-light);
    color: var(--primary-dark);
}

#scanner {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: black !important;
    z-index: 99999 !important;
    display: none;
}

#scanner video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
}

#closeScanner {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: white;
    color: black;
    font-size: 24px;
    z-index: 100001;
    border: none;
    cursor: pointer;
}

@media (max-width: 600px) {
    .site-header {
        padding: 24px 16px 44px;
    }

    .logo {
        font-size: 1.5rem;
    }

    .container {
        padding: 0 12px 40px;
    }

    .card {
        padding: 18px;
        border-radius: 14px;
    }

    .search-row {
        flex-direction: column;
    }

    .search-row .btn-primary {
        width: 100%;
    }

    .stats-grid {
        grid-template-columns: 1fr;
    }

    .price-large {
        font-size: 1.5rem;
    }
}

.region-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.region-card{

    width:340px;

    background:#fff;

    border-radius:20px;

    padding:30px;

    box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.region-card h2{

    text-align:center;

    margin-bottom:20px;

}

.region-card label{

    display:block;

    margin-top:15px;

    margin-bottom:5px;

    font-weight:bold;

}

.region-card select{

    width:100%;

    padding:10px;

    border-radius:10px;

    border:1px solid #ddd;

}

.region-card button{

    margin-top:25px;

    width:100%;

}
.header-inner {
    position: relative;
}

.icon-button {
    position: absolute;
    top: 10px;
    right: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    width: 42px;
    height: 42px;

    background: none;
    border: none;

    cursor: pointer;

    color: #E0E0E0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
}

.icon-button:hover {
    color: #F5F5F5;
}

.icon-button .material-icons {
    font-size: 32px;
}
.modal.hidden{
    display:none;
}

.modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:1000;

}

.modal-content{

    width:320px;

    max-width:90%;

    background:white;

    border-radius:12px;

    padding:24px;

}
</style>
</head>

<body>

<header class="site-header">
    <div class="header-inner">
        <h1 class="logo">
            <span class="logo-icon">🛒</span>
            ネミル
        </h1>
        <p class="tagline">みんなで作る底値・買い時データベース</p>
        <button id="settingsButton" class="icon-button" aria-label="設定">
          <span class="material-icons">settings</span>
        </button>
    </div>
</header>

<main class="container">

    <section class="card search-card">
        <label class="search-label" for="productName">商品を検索</label>
        <div class="search-row">
            <div class="input-wrap">
                <input id="productName" type="text" value="アタック抗菌EX" placeholder="商品名を入力…" autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button class="btn btn-primary" onclick="searchProduct()">検索</button>
        </div>
    </section>

    <section id="result" class="card">
        <div class="card-header">
            <span class="card-icon">📊</span>
            <h2>検索結果</h2>
        </div>
        <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>商品名を入力して検索してください</p>
        </div>
    </section>

    <section id="ranking" class="card">
        <div class="card-header">
            <span class="card-icon">🏪</span>
            <h2>店舗ランキング</h2>
        </div>
        <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>商品を検索すると店舗別の最安値が表示されます</p>
        </div>
    </section>

    <h2 class="section-heading">みんなの価格投稿</h2>
    <div id="price-list" class="card">
        <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <p>まだ投稿がありません</p>
        </div>
    </div>

    <section class="card">
        <div class="card-header">
            <span class="card-icon">✏️</span>
            <h2>価格を投稿</h2>
        </div>

        <div class="field-group">
            <label class="field-label" for="newProduct">商品名</label>
            <div class="product-row">
                <div class="input-wrap" style="flex:1">
                    <input id="newProduct" type="text" placeholder="例：アタック抗菌EX" autocomplete="off">
                    <div id="newSuggestions" class="suggestions"></div>
                </div>
                <button class="btn btn-icon" disabled title="近日対応予定">📷</button>
                <input type="file" id="barcodeFile" accept="image/*" capture="environment" style="display:none">
            </div>
        </div>

        <div class="field-group">
            <label class="field-label" for="newStore">店舗名</label>
            <div class="input-wrap">
                <input id="newStore" type="text" placeholder="例：コスモス" autocomplete="off">
                <div id="storeSuggestions" class="suggestions"></div>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label" for="newPrice">価格（円）</label>
            <input id="newPrice" type="number" placeholder="298" min="0">
        </div>

        <button class="btn btn-primary btn-block" onclick="addPrice()">投稿する</button>
    </section>

</main>

<div id="scanner"></div>
<button id="closeScanner">✕</button>

<div id="regionModal" class="region-modal">

    <div class="region-card">

        <h2>地域を設定してください</h2>

        <label>地方</label>

        <select id="regionSelect">
            <option>九州</option>
        </select>

        <label>都道府県</label>

        <select id="prefectureSelect">
            <option>福岡県</option>
        </select>

        <label>市町村</label>

        <select id="citySelect">
            <option>柳川市</option>
        </select>

        <button id="saveRegionBtn">

            決定

        </button>

    </div>

</div>
<div id="citySettings" class="modal hidden">

    <div class="modal-content">

        <h2>地域設定</h2>

        <div id="cityList">

            ここに地域一覧が表示されます

        </div>
        <button id="saveCitySettings">
            保存
        </button>
        
        <button id="closeCitySettings">
            閉じる
        </button>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script src="app.js"></script>
</body>
</html>
