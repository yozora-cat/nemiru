<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネミル</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    margin-top:12px;
    width:100%;
    padding:12px;
    border:0;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    margin:16px 0;
}

.stat-card{
    background:#f8fafc;
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:14px;
}

.stat-label{
    color:#64748b;
    font-size:13px;
    margin-bottom:6px;
}

.stat-value{
    color:#111827;
    font-size:20px;
    font-weight:bold;
}

.rank{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.rank-label{
    min-width:36px;
    color:#111827;
    font-weight:bold;
}

.rank-main{
    flex:1;
}

.rank-price{
    color:#111827;
    font-weight:bold;
}

.good{
    color:green;
    font-weight:bold;
}

.bad{
    color:red;
    font-weight:bold;
}

@media (max-width:600px){
    body{
        padding:12px;
    }

    .card{
        padding:16px;
        border-radius:8px;
    }

    .stats-grid{
        grid-template-columns:1fr;
    }

    .rank{
        align-items:flex-start;
    }
}
.suggestions {
    background: white;
    border: 1px solid #ddd;
    max-height: 200px;
    overflow-y: auto;
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #f0f0f0;
}
.product-row{
    display:flex;
    gap:10px;
}

.product-row input{
    flex:3;
    width:auto;
}

.barcode-btn{
    flex:1 !important;
    width:auto !important;
    margin-top:0;
}
#scanner{
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: black !important;
    z-index: 99999 !important;
    display: none;
}

#scanner video{
    width:100% !important;
    height:100% !important;
    object-fit:cover !important;
}
#closeScanner{
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    color:black;
    font-size:24px;
    z-index:100001;
}
</style>
</head>

<body>

<div class="container">

    <h1>🛒 ネミル</h1>

<div class="card">
    <h2>商品検索</h2>

    <input id="productName" type="text" value="アタック抗菌EX">

    <div id="suggestions" class="suggestions"></div>

    <button onclick="searchProduct()">
        検索
    </button>
</div>

<div id="result" class="card">
        <h2>検索結果</h2>
    <p>商品を検索してください</p>
</div>
<div id="ranking" class="card">
    <h2>店舗ランキング</h2>
    <p>商品を検索してください</p>
</div>
<h2>みんなの価格投稿</h2>
<div id="price-list"></div>
<div class="card">
    <h2>価格投稿</h2>

    <div class="product-row">

        <input id="newProduct"
               type="text"
               placeholder="商品名">

        <button class="barcode-btn"
                onclick="startScanner()">
            📷
        </button>
        <input
         type="file"
         id="barcodeFile"
         accept="image/*"
         capture="environment">
    </div>

    <div id="newSuggestions"
         class="suggestions"></div>

    <br>

    <input id="newStore"
           type="text"
           placeholder="店舗名">

    <div id="storeSuggestions"
         class="suggestions"></div>

    <br>

    <input id="newPrice"
           type="number"
           placeholder="価格">

    <br>

    <button onclick="addPrice()">
        登録
    </button>
</div>
    <div class="card">
        <h2>買い時判定</h2>

        <p>現在価格：398円</p>
        <p>過去90日底値：298円</p>
        <p>平均価格：378円</p>

        <p class="bad">
            今はやや高めです
        </p>
    </div>

    <div class="card">
        <h2>近所の価格ランキング</h2>

        <div class="rank">🥇 コスモス　298円</div>
        <div class="rank">🥈 ダイレックス　318円</div>
        <div class="rank">🥉 サニー　328円</div>
        <div class="rank">4位 マックスバリュ　348円</div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script src="app.js"></script>
    <div id="scanner">
    </div>
            <button id="closeScanner">✕</button>
</body>
</html>
